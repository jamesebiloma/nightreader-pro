name: nightreader_pro
description: A feature-rich PDF reader with dark mode optimized for night reading
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8

  # PDF Rendering (flutter_pdfview — lightweight and free)
  flutter_pdfview: ^1.3.2

  # File handling
  file_picker: ^8.1.2
  path_provider: ^2.1.4
  open_file: ^3.3.2

  # State Management
  provider: ^6.1.2

  # Local Storage — hive WITHOUT the generator (no code generation needed)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Shared Preferences (simpler key-value storage)
  shared_preferences: ^2.3.2

  # Date formatting
  intl: ^0.19.0

  # Unique IDs
  uuid: ^4.5.1

  # Permissions
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  # NOTE: hive_generator and build_runner intentionally REMOVED.
  # Our code uses hive as simple key-value storage (box.put / box.get)
  # and does NOT use @HiveType / @HiveField annotations, so no
  # code generation is required. This eliminates the analyzer conflict.

flutter:
  uses-material-design: true
